#:schema https://raw.githubusercontent.com/4lve/SteelMC/refs/heads/master/package-content/config.schema.json

[server]
# Server port
server_port = 25565
# Maximum number of players allowed on the server
max_players = 20
# Allow view_distance above vanilla's 32-chunk cap, up to 127.
allow_extended_view_distance = false
# Maximum view distance in chunks. Normally 1-32; 1-127 when allow_extended_view_distance is true.
view_distance = 10
# Maximum simulation distance in chunks
simulation_distance = 10
# Whether to use Mojang's authentication service
online_mode = true
# Optional authentication endpoint for online mode. Omit to use Mojang's session server.
# auth_server = "https://sessionserver.mojang.com/session/minecraft/hasJoined"
# Whether to enable encryption for client-server communication
encryption = true
# Whether the server allows unauthorized client flight
allow_flight = false
# Message of the day displayed in server lists
motd = "A Steel Server"

# Whether to use a custom favicon for the server
use_favicon = true
# Path to the favicon file (PNG format, 64x64 pixels)
favicon = "config/favicon.png"
# Whether to enforce secure chat
enforce_secure_chat = false
# Vanilla chat spam threshold window in seconds
chat_spam_threshold_seconds = 10
# Vanilla command spam threshold window in seconds
command_spam_threshold_seconds = 10

# Optional worker counts for server thread pools. 0 or omitted uses each pool's automatic default.
[server.threads]
# Worker threads for the primary Tokio runtime.
main_runtime = 0
# Worker threads for the chunk Tokio runtime.
chunk_runtime = 0
# Worker threads for the Rayon chunk generation pool.
chunk_generation = 0

# Compression settings
[server.compression]
threshold = 256
level = 4

# Server links configuration
[server.server_links]
# Enable server links feature
enable = true

[[server.server_links.links]]
label = "bug_report"
url = "https://github.com/4lve/SteelMC/issues"

[[server.server_links.links]]
label = "website"
url = "https://github.com/4lve/SteelMC"

# The news channel on discord
[[server.server_links.links]]
label = "announcements"
url = "https://discord.com/channels/1428487339759370322/1428487584966774795"

# Custom TextComponent (object label with formatting)
[[server.server_links.links]]
label = { text = "Visit the SteelMC Discord", color = "blue", bold = true }
url = "https://discord.gg/suSXXNdVSf"

# Logging configuration
[log]
# Path where store the log files and history
log_path = "./.logs"
# The level of information the logger will show
log_level = "info"
# Time format: "none", "date" (HH:MM:SS:mmm), or "uptime" (seconds since start)
time = "uptime"
# Whether the module_path of the log should be displayed
module_path = false
# Whether the extra data of the log should be displayed
extra = false
# Whether the log should be written into a file
log_file = true
# Time between log file rotations
rotation_time = "daily"
# Amount of console commands saved
max_history = 50
