# https://github.com/bevyengine/bevy/blob/main/.cargo/config_fast_builds.toml for more details

[build]
rustflags = ["-Zthreads=0"]
# TODO: remove once nightly ICE with incremental cache is fixed
#incremental = false

[target.x86_64-unknown-linux-gnu]
rustflags = ["-Clink-arg=-fuse-ld=lld", "-Zthreads=0"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-Clink-arg=-fuse-ld=lld", "-Zthreads=0"]

[alias]
build-native = [
  "build",
  "--config",
  "build.rustflags=[\"-Zthreads=0\",\"-C\",\"target-cpu=native\"]",
  "--config",
  "target.x86_64-unknown-linux-gnu.rustflags=[\"-Clink-arg=-fuse-ld=lld\",\"-Zthreads=0\",\"-C\",\"target-cpu=native\"]",
  "--config",
  "target.aarch64-unknown-linux-gnu.rustflags=[\"-Clink-arg=-fuse-ld=lld\",\"-Zthreads=0\",\"-C\",\"target-cpu=native\"]",
]
run-native = [
  "run",
  "--config",
  "build.rustflags=[\"-Zthreads=0\",\"-C\",\"target-cpu=native\"]",
  "--config",
  "target.x86_64-unknown-linux-gnu.rustflags=[\"-Clink-arg=-fuse-ld=lld\",\"-Zthreads=0\",\"-C\",\"target-cpu=native\"]",
  "--config",
  "target.aarch64-unknown-linux-gnu.rustflags=[\"-Clink-arg=-fuse-ld=lld\",\"-Zthreads=0\",\"-C\",\"target-cpu=native\"]",
]
