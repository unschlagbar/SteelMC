[files]
extend-exclude = ["**/build_assets/**", "*.json"]

[type.locale]
extend-glob = ["**/locale.rs"]
check-file = false

[default.extend-words]
flate = "flate"
strat = "strat"
axe = "axe"
BlockBehaviour = "BlockBehaviour"
behaviour = "behaviour"
interruptable = "interruptable"
neighbour = "neighbour"
# Vanilla stronghold piece-type IDs (shs, shsd, shrc, ...).
shs = "shs"

[default]
locale = "en-us"
